name: Deploy Nginx with Ansible

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add known host
        run: |
          ssh-keyscan -H 20.234.217.116 >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventories/azure.ini ansible/playbooks/nginx.yml

      - name: Run Ansible Playbook
        run: |
          export ANSIBLE_ROLES_PATH=ansible/roles
          ansible-playbook -i ansible/inventories/azure.ini ansible/playbooks/nginx.yml