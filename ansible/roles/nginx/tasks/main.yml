---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Deploy custom index page
  copy:
    dest: /var/www/html/index.html
    content: |
      <h1>GOMYCODE DevOps Interview - Nginx is working </h1>